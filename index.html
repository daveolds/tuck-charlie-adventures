<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tuck & Charlie Adventures</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="400" height="600"></canvas>

    <div id="overlay" class="overlay">
      <h1>Tuck &amp; Charlie Adventures</h1>
      <p class="tagline">Jump to the sky with your favorite pups!</p>

      <div class="character-select">
        <button class="char-btn selected" data-char="tuck" aria-pressed="true">
          <span class="char-icon tuck">T</span>
          <span class="char-name">Tuck</span>
          <span class="char-desc">Steady jumper</span>
        </button>
        <button class="char-btn" data-char="charlie" aria-pressed="false">
          <span class="char-icon charlie">C</span>
          <span class="char-name">Charlie</span>
          <span class="char-desc">Springy leaps</span>
        </button>
      </div>

      <button id="start-btn" class="primary-btn">Start Adventure</button>
      <p class="controls-hint">← → or A D to move · Space to jump boost</p>
    </div>

    <div id="hud" class="hud hidden">
      <span id="score">0</span>
      <span id="high-score">Best: 0</span>
    </div>

    <div id="game-over" class="overlay hidden">
      <h2>Good boy energy!</h2>
      <p id="final-score">Score: 0</p>
      <p id="new-record" class="new-record hidden">New high score!</p>
      <button id="retry-btn" class="primary-btn">Play Again</button>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
